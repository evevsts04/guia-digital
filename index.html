<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia Digital | Modo Professor Ativo</title>
    <!-- Dependências -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web@2.0.3"></script>
    <!-- Bibliotecas para ler PDF e DOCX -->
    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
    
    <style>
        /* Estilos personalizados */
        .card-shadow { 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); 
        }
        .transition-all {
            transition: all 0.2s ease-in-out;
        }
        .module-content {
            line-height: 1.7;
            white-space: pre-line;
        }
        .file-upload-area {
            border: 2px dashed #cbd5e1;
            transition: all 0.2s ease;
        }
        .file-upload-area:hover, .file-upload-area.active {
            border-color: #6366f1;
            background-color: #f8fafc;
        }
        .loading-spinner {
            border: 3px solid #e2e8f0;
            border-top: 3px solid #6366f1;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

    <!-- Cabeçalho -->
    <header class="bg-white border-b border-slate-200 p-4 flex justify-between items-center sticky top-0 z-10 shadow-sm">
        <h1 class="text-xl font-bold text-slate-800">Guia Digital</h1>
        <button id="modeToggle" onclick="toggleProfessorMode()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-medium transition-all focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
            Trocar para Modo Professor
        </button>
    </header>

    <!-- Área Principal -->
    <div id="app" class="max-w-6xl mx-auto px-4 py-8">
        <!-- Conteúdo injetado dinamicamente -->
    </div>

    <!-- Modal de Edição -->
    <div id="editModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-white p-6 rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
            <h2 id="modalTitle" class="text-2xl font-bold mb-4">Editar Conteúdo do Módulo</h2>

            <!-- Área de Upload de Arquivo -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-slate-700 mb-2">Importar material base (PDF ou DOCX)</label>
                <div id="dropArea" class="file-upload-area rounded-xl p-6 text-center cursor-pointer">
                    <input type="file" id="fileInput" accept=".pdf,.docx" class="hidden">
                    <i class="ph-upload-simple text-3xl text-slate-400 mb-2"></i>
                    <p class="text-slate-500">Arraste o arquivo aqui ou <span class="text-indigo-600 font-medium">clique para selecionar</span></p>
                    <p class="text-xs text-slate-400 mt-1">Suporta arquivos .pdf e .docx</p>
                </div>
                <div id="fileStatus" class="mt-2 text-sm hidden"></div>
            </div>

            <textarea id="editContent" class="w-full h-64 p-4 border border-slate-300 rounded-xl mb-4 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent resize-none" placeholder="Cole o texto da aula ou importe um arquivo acima..."></textarea>
            
            <div class="flex flex-col sm:flex-row gap-3">
                <button id="generateAllBtn" onclick="generateFullContent()" class="flex-1 bg-blue-600 text-white py-3 rounded-xl hover:bg-blue-700 transition-all flex items-center justify-center gap-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                    <i class="ph-sparkles"></i> Gerar Todo o Conteúdo + Quiz
                </button>
                <button onclick="generateAI()" class="flex-1 bg-purple-600 text-white py-3 rounded-xl hover:bg-purple-700 transition-all flex items-center justify-center gap-2 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:ring-offset-2">
                    <i class="ph-magic-wand"></i> Apenas Gerar Quiz
                </button>
                <button onclick="closeModal()" class="flex-1 bg-slate-200 hover:bg-slate-300 py-3 rounded-xl transition-all focus:outline-none focus:ring-2 focus:ring-slate-400 focus:ring-offset-2">Cancelar</button>
                <button onclick="saveChanges()" class="flex-1 bg-indigo-600 text-white py-3 rounded-xl hover:bg-indigo-700 transition-all flex items-center justify-center gap-2 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
                    <i class="ph-floppy-disk"></i> Salvar
                </button>
            </div>
        </div>
    </div>

    <script>
        // Variáveis Globais
        let isProfessor = false;
        let activeModuleId = null;
        let currentView = 'modules';
        
        // CORREÇÃO: Acessando o objeto global correto da biblioteca PDF.js
        const pdfjsLib = window.pdfjsLib;
        if (pdfjsLib) {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.worker.min.js';
        } else {
            console.error("Erro: A biblioteca PDF.js não foi carregada corretamente.");
        }

        // Dados dos Módulos
        let modules = JSON.parse(localStorage.getItem('guia_data')) || [
            { 
                id: 'win11', 
                title: 'Windows 11', 
                desc: 'Domine as ferramentas e funcionalidades para produtividade total.', 
                icon: 'ph-windows-logo', 
                content: '## Windows 11: Produtividade e Organização\n\nO Windows 11 traz uma interface moderna e ferramentas que facilitam o dia a dia.\n\n### Principais recursos:\n- Layout centralizado e personalizável\n- Áreas de trabalho virtuais para organizar projetos\n- Integração nativa com aplicativos da Microsoft\n- Melhorias em desempenho e segurança' 
            },
            { 
                id: 'office', 
                title: 'Pacote Office', 
                desc: 'Word, Excel, PowerPoint e muito mais.', 
                icon: 'ph-file-text', 
                content: '## Pacote Office: Ferramentas Essenciais\n\nConheça as funcionalidades principais de cada programa:\n\n### Word: Editor de texto profissional\n- Formatação avançada\n- Criação de índices e referências\n\n### Excel: Planilhas e cálculos\n- Fórmulas e funções\n- Gráficos e visualização de dados' 
            },
            { 
                id: 'ia', 
                title: 'Inteligência Artificial Generativa', 
                desc: 'Aprenda a criar prompts e explorar o futuro.', 
                icon: 'ph-robot', 
                content: '## IA Generativa: O Que Você Precisa Saber\n\nA IA generativa cria textos, imagens e conteúdos a partir de comandos.\n\n### Como escrever bons prompts:\n- Seja específico sobre o que quer\n- Defina o tom e o formato' 
            }
        ];

        // Salva dados no localStorage
        function saveData() {
            localStorage.setItem('guia_data', JSON.stringify(modules));
        }

        // Alterna entre modos
        function toggleProfessorMode() {
            isProfessor = !isProfessor;
            const btn = document.getElementById('modeToggle');
            btn.innerText = isProfessor ? "Ver como Aluno" : "Trocar para Modo Professor";
            btn.className = isProfessor 
                ? "px-4 py-2 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 font-medium transition-all focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-2" 
                : "px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-medium transition-all focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2";
            render();
        }

        // Navegação
        function openModule(id) {
            activeModuleId = id;
            currentView = 'module';
            render();
        }
        function backToModules() {
            currentView = 'modules';
            activeModuleId = null;
            render();
        }

        // Renderização
        function render() {
            const app = document.getElementById('app');
            if (currentView === 'modules') {
                app.innerHTML = `
                    <div class="mb-6">
                        <h2 class="text-2xl font-bold text-slate-800">Módulos do Curso</h2>
                        <p class="text-slate-500 mt-1">Escolha um conteúdo para explorar</p>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        ${modules.map(m => `
                            <div class="bg-white p-6 rounded-2xl border border-slate-200 card-shadow relative transition-all hover:scale-[1.02] hover:shadow-md">
                                ${isProfessor ? `
                                    <button onclick="openEdit('${m.id}')" class="absolute top-4 right-4 bg-yellow-400 hover:bg-yellow-500 p-2 rounded-full shadow-lg transition-all focus:outline-none focus:ring-2 focus:ring-yellow-500 focus:ring-offset-2" title="Editar conteúdo">
                                        <i class="ph-pencil text-white text-lg"></i>
                                    </button>
                                ` : ''}
                                <i class="${m.icon} text-4xl text-indigo-600 mb-4"></i>
                                <h3 class="text-xl font-bold mb-2">${m.title}</h3>
                                <p class="text-slate-500 text-sm mb-6">${m.desc}</p>
                                <button onclick="openModule('${m.id}')" class="w-full py-2 border border-indigo-600 text-indigo-600 rounded-xl hover:bg-indigo-50 transition-all font-medium">
                                    Acessar Módulo
                                </button>
                            </div>
                        `).join('')}
                    </div>
                `;
            } else {
                const mod = modules.find(m => m.id === activeModuleId);
                app.innerHTML = `
                    <button onclick="backToModules()" class="flex items-center gap-2 text-indigo-600 hover:text-indigo-800 mb-6 transition-all font-medium">
                        <i class="ph-arrow-left"></i> Voltar para lista de módulos
                    </button>
                    <div class="bg-white p-6 md:p-8 rounded-2xl border border-slate-200 card-shadow">
                        <div class="flex items-center gap-4 mb-6">
                            <i class="${mod.icon} text-5xl text-indigo-600"></i>
                            <div>
                                <h2 class="text-2xl font-bold text-slate-800">${mod.title}</h2>
                                <p class="text-slate-500">${mod.desc}</p>
                            </div>
                        </div>
                        <div class="module-content text-slate-700 mt-6">
                            ${mod.content.replace(/## (.*)/g, '<h3 class="text-xl font-bold mt-6 mb-2 text-slate-800">$1</h3>')
                                        .replace(/### (.*)/g, '<h4 class="text-lg font-semibold mt-4 mb-2 text-slate-700">$1</h4>')
                                        .replace(/- (.*)/g, '<li class="ml-4 list-disc">$1</li>')
                                        .replace(/\d+\. (.*)/g, '<li class="ml-4 list-decimal">$1</li>')
                                        .replace(/> "(.*)"/g, '<blockquote class="border-l-4 border-indigo-300 pl-4 italic text-slate-600 my-4">$1</blockquote>')}
                        </div>
                        ${isProfessor ? `
                            <div class="mt-8 pt-6 border-t border-slate-200">
                                <button onclick="openEdit('${mod.id}')" class="px-6 py-3 bg-yellow-400 hover:bg-yellow-500 rounded-xl text-slate-800 font-medium transition-all flex items-center gap-2">
                                    <i class="ph-pencil"></i> Editar este conteúdo
                                </button>
                            </div>
                        ` : ''}
                    </div>
                `;
            }
        }

        // Modal
        function openEdit(id) {
            activeModuleId = id;
            const mod = modules.find(m => m.id === id);
            document.getElementById('modalTitle').innerText = `Editar: ${mod.title}`;
            document.getElementById('editContent').value = mod.content;
            document.getElementById('fileStatus').classList.add('hidden');
            document.getElementById('editModal').classList.remove('hidden');
            setupFileUpload();
        }
        function closeModal() {
            document.getElementById('editModal').classList.add('hidden');
            activeModuleId = null;
        }
        function saveChanges() {
            const content = document.getElementById('editContent').value.trim();
            if (!content) { alert("O conteúdo não pode estar vazio!"); return; }
            const mod = modules.find(m => m.id === activeModuleId);
            mod.content = content;
            saveData();
            closeModal();
            render();
            alert("Conteúdo salvo com sucesso! ✅");
        }

        // 📂 Upload e Leitura de Arquivos
        function setupFileUpload() {
            const dropArea = document.getElementById('dropArea');
            const fileInput = document.getElementById('fileInput');
            const fileStatus = document.getElementById('fileStatus');

            // Clique para selecionar
            dropArea.onclick = () => fileInput.click();

            // Drag & Drop
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(event => {
                dropArea.addEventListener(event, e => {
                    e.preventDefault();
                    e.stopPropagation();
                });
            });
            ['dragenter', 'dragover'].forEach(event => {
                dropArea.addEventListener(event, () => dropArea.classList.add('active'));
            });
            ['dragleave', 'drop'].forEach(event => {
                dropArea.addEventListener(event, () => dropArea.classList.remove('active'));
            });
            dropArea.addEventListener('drop', e => {
                const files = e.dataTransfer.files;
                if (files.length) processFile(files[0]);
            });

            // Seleção por clique
            fileInput.onchange = e => {
                if (e.target.files.length) processFile(e.target.files[0]);
            };
        }

        async function processFile(file) {
            const fileStatus = document.getElementById('fileStatus');
            fileStatus.classList.remove('hidden');
            fileStatus.innerHTML = `<div class="flex items-center gap-2 text-indigo-600"><div class="loading-spinner"></div> Lendo arquivo...</div>`;

            try {
                let text = '';
                if (file.type === 'application/pdf') {
                    text = await readPdf(file);
                } else if (file.type === 'application/vnd.openxmlformats-officedocument.wordprocessingml.document') {
                    text = await readDocx(file);
                } else {
                    throw new Error("Formato não suportado. Use .pdf ou .docx");
                }

                document.getElementById('editContent').value = text;
                fileStatus.innerHTML = `<div class="text-green-600 flex items-center gap-2"><i class="ph-check-circle"></i> Arquivo carregado com sucesso! (${text.length} caracteres)</div>`;
            } catch (erro) {
                fileStatus.innerHTML = `<div class="text-red-600 flex items-center gap-2"><i class="ph-x-circle"></i> Erro: ${erro.message}</div>`;
            }
        }

        // Leitura de PDF
        async function readPdf(file) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let textoCompleto = '';

            for (let i = 1; i <= pdf.numPages; i++) {
                const pagina = await pdf.getPage(i);
                const conteudo = await pagina.getTextContent();
                const textoPagina = conteudo.items.map(item => item.str).join(' ');
                textoCompleto += textoPagina + '\n\n';
            }
            return textoCompleto.trim();
        }

        // Leitura de DOCX
        async function readDocx(file) {
            const arrayBuffer = await file.arrayBuffer();
            const resultado = await mammoth.extractRawText({ arrayBuffer: arrayBuffer });
            return resultado.value.trim();
        }

        // 🤖 Geração de Conteúdo Completo
        function generateFullContent() {
            const material = document.getElementById('editContent').value.trim();
            if (material.length < 100) {
                alert("Por favor, importe ou cole pelo menos 100 caracteres do material base!");
                return;
            }

            // Simulação de geração inteligente
            const gerado = `
---
## 📚 CONTEÚDO ESTRUTURADO A PARTIR DO MATERIAL

### 🎯 Objetivo da Aula
Compreender os conceitos principais apresentados no material, aplicando-os em situações práticas e resolvendo desafios.

### 📝 Resumo do Conteúdo
${material.substring(0, 600)}...

---
### 🧩 DESAFIOS E ATIVIDADES
1. **Desafio Básico**: Explique com suas palavras qual é a ideia central do texto apresentado.
2. **Desafio Prático**: Liste 3 exemplos de aplicação prática dos assuntos abordados no seu dia a dia.
3. **Desafio Avançado**: Compare o conteúdo estudado com conhecimentos que você já tinha sobre o tema e aponte semelhanças e diferenças.

---
### 📋 QUIZ DE VERIFICAÇÃO
**1. Qual é o tema principal do material?**
   (A) Um assunto secundário pouco relevante
   (B) O conteúdo central apresentado no início
   (C) Apenas um exemplo prático isolado
   (D) Nenhuma das alternativas
   ✅ Resposta correta: B

**2. Qual habilidade podemos desenvolver com este estudo?**
   (A) Apenas memorização de definições
   (B) Aplicação crítica e reflexiva
   (C) Cópia de conteúdos prontos
   (D) Uso sem questionamento
   ✅ Resposta correta: B

**3. O que o material sugere sobre o tema?**
   (A) Que é um assunto ultrapassado
   (B) Que tem importância e aplicação prática
   (C) Que serve apenas para provas
   (D) Que não tem relação com outros assuntos
   ✅ Resposta correta: B

**4. Ao final desta aula, você deve ser capaz de:**
   (A) Repetir frases exatas do texto
   (B) Entender, explicar e aplicar o conhecimento
   (C) Apenas fazer resumos
   (D) Nenhuma das opções
   ✅ Resposta correta: B

**5. Qual é a melhor forma de aprofundar este conteúdo?**
   (A) Praticando e pesquisando mais sobre o tema
   (B) Decorando apenas as respostas
   (C) Lendo apenas uma vez
   (D) Não fazendo nada
   ✅ Resposta correta: A
            `;

            document.getElementById('editContent').value = material + gerado;
            alert("Conteúdo completo + desafios + quiz gerados! 🚀");
        }

        // Apenas Quiz
        function generateAI() {
            const content = document.getElementById('editContent').value.trim();
            if (content.length < 50) {
                alert("Adicione pelo menos 50 caracteres para gerar o quiz!");
                return;
            }
            const quiz = `

---
### 📝 QUIZ
1. Qual é o ponto principal do texto?
   (A) Detalhe secundário
   (B) Ideia central
   (C) Exemplo isolado
   ✅ Resposta: B

2. Como aplicar este conhecimento?
   (A) Na prática
   (B) Apenas na teoria
   ✅ Resposta: A
            `;
            document.getElementById('editContent').value += quiz;
            alert("Quiz gerado! ✅");
        }

        // Atalho ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !document.getElementById('editModal').classList.contains('hidden')) closeModal();
        });

        render();
    </script>
</body>
</html>
