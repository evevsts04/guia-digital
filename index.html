<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia Digital | Aprendizado Moderno</title>
    <!-- Tailwind CSS para Estilização Moderna -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons para ícones -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); }
        .pdf-frame { width: 100%; height: 70vh; border: none; border-radius: 1rem; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

    <div id="app" class="max-w-6xl mx-auto px-4 py-8">
        <!-- O conteúdo será injetado aqui -->
    </div>

    <script>
        // --- DADOS DA APLICAÇÃO ---
        const state = {
            view: 'dashboard', // dashboard, module_hub, content
            activeModule: null,
            activeSubView: null, // pdf, desafio, quiz
            modules: [
                { id: 'win11', title: 'Windows 11', icon: 'ph-windows-logo', color: 'text-blue-500', bg: 'bg-blue-50', desc: 'Produtividade total.', pdf: 'https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf' },
                { id: 'office', title: 'Office', icon: 'ph-file-text', color: 'text-green-500', bg: 'bg-green-50', desc: 'Word, Excel, PPT.', pdf: '' },
                { id: 'capcut', title: 'CapCut', icon: 'ph-clapperboard', color: 'text-pink-500', bg: 'bg-pink-50', desc: 'Edição de vídeo.', pdf: '' },
                { id: 'ia', title: 'Inteligência Artificial', icon: 'ph-robot', color: 'text-orange-500', bg: 'bg-orange-50', desc: 'Prompts e futuro.', pdf: '' }
            ]
        };

        // --- RENDERIZADOR ---
        function render() {
            const app = document.getElementById('app');
            
            if (state.view === 'dashboard') {
                app.innerHTML = `
                    <header class="mb-12">
                        <h1 class="text-4xl font-extrabold text-slate-900">Olá! 👋</h1>
                        <p class="text-slate-500 mt-2">O que vamos aprender hoje?</p>
                    </header>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        ${state.modules.map(m => `
                            <div onclick="openModule('${m.id}')" class="bg-white p-8 rounded-3xl border border-slate-100 card-shadow cursor-pointer transition-all hover:scale-105 group">
                                <div class="${m.bg} ${m.color} w-16 h-16 rounded-2xl flex items-center justify-center mb-6 text-3xl group-hover:shadow-lg transition-all">
                                    <i class="${m.icon}"></i>
                                </div>
                                <h3 class="text-xl font-bold mb-2">${m.title}</h3>
                                <p class="text-slate-500 text-sm">${m.desc}</p>
                            </div>
                        `).join('')}
                    </div>
                `;
            } else if (state.view === 'module_hub') {
                const mod = state.activeModule;
                app.innerHTML = `
                    <button onclick="goBack()" class="flex items-center text-slate-500 mb-8 hover:text-slate-800 transition-colors">
                        <i class="ph-arrow-left mr-2"></i> Voltar ao painel
                    </button>
                    <div class="flex items-center gap-6 mb-12">
                        <div class="${mod.bg} ${mod.color} w-24 h-24 rounded-3xl flex items-center justify-center text-4xl">
                            <i class="${mod.icon}"></i>
                        </div>
                        <div>
                            <h1 class="text-3xl font-bold">${mod.title}</h1>
                            <p class="text-slate-500">${mod.desc}</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div onclick="setSubView('pdf')" class="bg-white p-6 rounded-2xl border cursor-pointer hover:border-indigo-400 transition-all">
                            <i class="ph-presentation-chart text-3xl text-indigo-500"></i>
                            <h2 class="font-bold text-lg mt-4">Apresentação (PDF)</h2>
                            <p class="text-sm text-slate-500">Slides e material teórico.</p>
                        </div>
                        <div onclick="setSubView('desafio')" class="bg-white p-6 rounded-2xl border cursor-pointer hover:border-indigo-400 transition-all">
                            <i class="ph-lightning text-3xl text-yellow-500"></i>
                            <h2 class="font-bold text-lg mt-4">Desafio Prático</h2>
                            <p class="text-sm text-slate-500">Coloque em prática agora.</p>
                        </div>
                        <div onclick="setSubView('quiz')" class="bg-white p-6 rounded-2xl border cursor-pointer hover:border-indigo-400 transition-all">
                            <i class="ph-brain text-3xl text-purple-500"></i>
                            <h2 class="font-bold text-lg mt-4">Quiz de Fixação</h2>
                            <p class="text-sm text-slate-500">Teste seus conhecimentos.</p>
                        </div>
                    </div>
                `;
            } else if (state.view === 'content') {
                const mod = state.activeModule;
                app.innerHTML = `
                    <button onclick="state.view='module_hub'; render()" class="flex items-center text-slate-500 mb-8 hover:text-slate-800">
                        <i class="ph-arrow-left mr-2"></i> Voltar ao menu do módulo
                    </button>
                    <div class="bg-white p-8 rounded-3xl border shadow-sm min-h-[70vh]">
                        ${getContentTemplate(mod)}
                    </div>
                `;
            }
        }

        // --- LÓGICA DE NAVEGAÇÃO ---
        function openModule(id) {
            state.activeModule = state.modules.find(m => m.id === id);
            state.view = 'module_hub';
            render();
        }

        function setSubView(view) {
            state.activeSubView = view;
            state.view = 'content';
            render();
        }

        function goBack() {
            state.view = 'dashboard';
            render();
        }

        function getContentTemplate(mod) {
            if (state.activeSubView === 'pdf') {
                return `
                    <h2 class="text-2xl font-bold mb-6">Apresentação: ${mod.title}</h2>
                    <iframe src="${mod.pdf}" class="pdf-frame" title="PDF"></iframe>
                `;
            } else if (state.activeSubView === 'desafio') {
                return `
                    <h2 class="text-2xl font-bold mb-6">Desafio Prático</h2>
                    <p class="text-lg text-slate-600">Chegou a hora de praticar! Siga os passos conforme vimos nos slides e prepare seu computador.</p>
                `;
            } else {
                return `
                    <h2 class="text-2xl font-bold mb-6">Quiz: ${mod.title}</h2>
                    <div class="space-y-4">
                        <button class="w-full p-4 border rounded-xl hover:bg-slate-50">Alternativa A</button>
                        <button class="w-full p-4 border rounded-xl hover:bg-slate-50">Alternativa B</button>
                    </div>
                `;
            }
        }

        // Inicialização
        render();
    </script>
</body>
</html>
