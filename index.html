<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia Digital App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons para ícones leves -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

    <div id="app"></div>

    <script>
        // --- DADOS INICIAIS (Carregados do LocalStorage ou Padrão) ---
        const defaultData = [
            { id: 'win11', title: 'Windows 11', icon: 'ph-desktop', color: 'blue', desc: 'Produtividade.', lessons: [{title: 'Menu Iniciar', content: 'Explore o menu centralizado.'}], quiz: { question: 'Qual atalho?', options: ['Win+E','Ctrl+E'], correct: 0 } },
            { id: 'office', title: 'MS Office', icon: 'ph-file-text', color: 'green', desc: 'Word, Excel, PPT.', lessons: [], quiz: null },
            { id: 'capcut', title: 'CapCut', icon: 'ph-clapperboard', color: 'teal', desc: 'Edição de Vídeo.', lessons: [], quiz: null },
            { id: 'ia', title: 'Criando com IA', icon: 'ph-robot', color: 'orange', desc: 'Prompts e produtividade.', lessons: [], quiz: null }
        ];

        let state = JSON.parse(localStorage.getItem('guiaDigitalData')) || defaultData;
        let view = 'dashboard';
        let activeModule = null;
        let activeLesson = 0;

        function saveState() {
            localStorage.setItem('guiaDigitalData', JSON.stringify(state));
        }

        // --- RENDERIZADOR ---
        function render() {
            const app = document.getElementById('app');
            app.innerHTML = '';
            
            // Navbar
            app.innerHTML += `
                <nav class="bg-white shadow-sm p-4 sticky top-0 z-50">
                    <div class="max-w-6xl mx-auto flex justify-between items-center">
                        <h1 class="font-bold text-xl cursor-pointer" onclick="navigate('dashboard')">Guia Digital</h1>
                        <button onclick="navigate('admin')" class="text-sm bg-gray-100 px-3 py-1 rounded-lg">Área do Professor</button>
                    </div>
                </nav>
                <div id="content" class="max-w-6xl mx-auto p-4"></div>
            `;

            const content = document.getElementById('content');

            if (view === 'dashboard') {
                content.innerHTML = `
                    <h2 class="text-2xl font-bold mb-6">Módulos</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        ${state.map(m => `
                            <div class="bg-white p-6 rounded-xl border border-${m.color}-200 shadow-sm cursor-pointer hover:shadow-md" onclick="openModule('${m.id}')">
                                <i class="${m.icon} text-4xl text-${m.color}-500"></i>
                                <h3 class="font-bold text-lg mt-2">${m.title}</h3>
                                <p class="text-sm text-gray-500">${m.desc}</p>
                            </div>
                        `).join('')}
                    </div>
                `;
            } else if (view === 'admin') {
                content.innerHTML = `
                    <h2 class="text-2xl font-bold mb-6">Área do Professor</h2>
                    <div class="space-y-4">
                        ${state.map(m => `
                            <div class="bg-white p-4 flex justify-between items-center rounded-lg border">
                                <span>${m.title}</span>
                                <button onclick="editModule('${m.id}')" class="text-blue-600 font-bold">Editar</button>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
        }

        // --- NAVEGAÇÃO E LÓGICA ---
        function navigate(v) { view = v; render(); }
        
        function openModule(id) {
            activeModule = state.find(m => m.id === id);
            view = 'module';
            render();
        }

        function editModule(id) {
            const mod = state.find(m => m.id === id);
            const newTitle = prompt("Novo título:", mod.title);
            if(newTitle) {
                mod.title = newTitle;
                saveState();
                render();
            }
        }

        // Inicializa
        render();
    </script>
</body>
</html>
